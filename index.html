<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0B07" />
    <title>محرك العرض الواقعي — JewelAR</title>
    <meta
      name="description"
      content="تجربة المجوهرات الواقعية على جهازك — ذهب ولمعان أحجار بدقة عالية، بدون خوادم."
    />
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      // Shopify deep-link: ?piece=earring|necklace opens the camera (AR) page
      // directly; ?piece=ring|view (or none) stays in the 3D viewer. Runs before
      // the viewer module loads so we never init the viewer when redirecting.
      (function () {
        var p = new URLSearchParams(location.search).get('piece');
        if (p === 'earring' || p === 'necklace') {
          location.replace('tryon.html?piece=' + p);
        }
      })();
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <header class="topbar">
      <div class="brand">
        <div class="brand-name">JewelAR</div>
        <div class="brand-sub">محرك العرض الواقعي — PBR · انعكاسات بيئية</div>
      </div>
      <nav class="mode-toggle" aria-label="الوضع">
        <a class="mode active" href="index.html" aria-current="page">عارض ٣D</a>
        <a class="mode" href="tryon.html">المرآة</a>
      </nav>
    </header>

    <p class="hint">اسحب لتدوير القطعة · لاحظ لمعان الذهب وتلألؤ الأحجار مع الحركة</p>

    <section class="panel">
      <div class="panel-inner">
        <div class="row">
          <span class="lbl">القطعة</span>
          <div class="seg" id="pieces"></div>
        </div>
        <div class="row">
          <span class="lbl">المعدن</span>
          <div class="seg" id="metals"></div>
        </div>
        <div class="row">
          <span class="lbl">الحجر</span>
          <div class="seg" id="gems"></div>
        </div>
        <div class="row">
          <span class="lbl">الإضاءة</span>
          <input type="range" id="exposure" min="0.5" max="1.5" step="0.05" value="1.0" />
        </div>
      </div>
    </section>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>جارٍ تجهيز محرك العرض…</p>
      <small>يُحمّل محرك ٣D لمرة واحدة. كل العرض يتم على جهازك — بدون خوادم.</small>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
